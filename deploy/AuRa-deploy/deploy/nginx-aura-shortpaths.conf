# Подключение в http { } — в КАЖДЫЙ server, где смотрит сайт (и :80, и :443):
#   include /opt/aura/AuRa-deploy/deploy/nginx-aura-shortpaths.conf;
# Важно: строка include должна быть ПЕРЕД «location / { try_files ... }».
# Фрагмент в кавычках: иначе # в URL съедается как комментарий.
#
# APK только через /api/apk (HMAC), не отдавайте публично по старому пути:
#   location = /assets/AuRa.APK { return 404; }

location = /assets/AuRa.APK {
  return 404;
}

location = /platform {
  return 301 "$scheme://$host/#platform";
}
location = /screenshots {
  return 301 "$scheme://$host/#screenshots";
}
location = /workflow {
  return 301 "$scheme://$host/#workflow";
}
location = /faq {
  return 301 "$scheme://$host/#faq";
}
location = /contacts {
  return 301 "$scheme://$host/#contacts";
}
